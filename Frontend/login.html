<!DOCTYPE html>
<html>
<head>
    <title>Login - VacciNet</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <a href="signup.html">Create Account</a>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("https://vaccinet-backend.onrender.com/api/auth/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data) {
            alert("Invalid login!");
            return;
        }

        // Save user
        localStorage.setItem("user", JSON.stringify(data));

        alert("Login Successful ✅");

        // Redirect to main app
        window.location.href = "index.html";

    } catch (err) {
        alert("Server error!");
        console.error(err);
    }
}
</script>

</body>
</html>
